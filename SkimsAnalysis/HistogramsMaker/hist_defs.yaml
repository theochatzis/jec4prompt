#======================
# 1D Histograms
#======================
# Tag
Tag_pt:
  title: "Tag pT; Tag p_{T} [GeV]; Events"
  bins: [50, 30, 200]
  variable: "Tag_pt"

Tag_eta:
  title: "Tag Eta; Tag #eta; Events"
  bins: [30, -3, 3]
  variable: "Tag_eta"

Tag_phi:
  title: "Tag Phi; Tag #phi; Events"
  bins: [30, -3.15, 3.15]
  variable: "Tag_phi"

Tag_mass:
  title: "Tag Mass; Tag mass [GeV]; Events"
  bins: [30, 0, 50]
  variable: "Tag_mass"

# Probe
Probe_pt:
  title: "Probe pT; Probe p_{T} [GeV]; Events"
  bins: [50, 30, 200]
  variable: "Probe_pt"

Probe_eta:
  title: "Probe Eta; Probe #eta; Events"
  bins: [30, -3, 3]
  variable: "Probe_eta"

Probe_phi:
  title: "Probe Phi; Probe #phi; Events"
  bins: [30, -3.15, 3.15]
  variable: "Probe_phi"

Probe_mass:
  title: "Probe Mass; Probe mass [GeV]; Events"
  bins: [30, 0, 50]
  variable: "Probe_mass"

